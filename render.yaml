services:
  - type: web
    name: calendar-api
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    autoDeploy: true
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8000"
      - key: CALENDAR_DATABASE_URL
        value: sqlite:////app/data/calendar.sqlite
      - key: CALENDAR_JWT_SECRET
        generateValue: true
      - key: CALENDAR_CORS_ORIGINS
        fromService:
          type: web
          name: calendar-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CALENDAR_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: CALENDAR_BOOKING_RATE_LIMIT_MAX
        value: "5"
      - key: CALENDAR_BOOKING_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: CALENDAR_SEED_ON_START
        value: "false"
    disk:
      name: calendar-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: calendar-web
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_API_URL
        fromService:
          type: web
          name: calendar-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
